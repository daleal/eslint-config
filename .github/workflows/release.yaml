name: release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump to publish
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure workflow runs from main
        run: test "$GITHUB_REF_NAME" = "main"

      - name: Verify package versions are aligned
        run: |
          VERSION="$(bun -p "require('./packages/eslint-config-core/package.json').version")"
          test "$VERSION" = "$(bun -p "require('./packages/eslint-config-ts/package.json').version")"
          test "$VERSION" = "$(bun -p "require('./packages/eslint-config-vue/package.json').version")"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Bump package versions
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: bun scripts/bump.ts "$RELEASE_TYPE"

      - name: Commit release bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add packages/eslint-config-core/package.json packages/eslint-config-ts/package.json packages/eslint-config-vue/package.json
          git commit -m "release: v$VERSION"
          git push origin HEAD:main

      - name: Publish core
        run: npm publish --workspace @daleal/eslint-config-core --access public --provenance

      - name: Publish typescript preset
        run: npm publish --workspace @daleal/eslint-config-ts --access public --provenance

      - name: Publish vue preset
        run: npm publish --workspace @daleal/eslint-config-vue --access public --provenance

      - name: Tag release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          gh release create "v$VERSION" \
            --target main \
            --title "v$VERSION" \
            --notes "Automated $RELEASE_TYPE release."
